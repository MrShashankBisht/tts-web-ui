<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kokoro TTS Studio</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family: "Segoe UI", Arial, sans-serif;
background: linear-gradient(135deg,#4f7cff,#7b9dff);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
background:rgba(255,255,255,0.95);
backdrop-filter: blur(10px);
padding:30px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
color:#333;
}

textarea{
width:100%;
padding:14px;
font-size:16px;
border-radius:8px;
border:1px solid #ddd;
resize:none;
transition:0.3s;
}

textarea:focus{
outline:none;
border-color:#4a7cff;
box-shadow:0 0 5px rgba(74,124,255,0.4);
}

.stats{
margin-top:10px;
font-size:14px;
color:#555;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.controls{
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.control-group{
display:flex;
flex-direction:column;
}

label{
font-weight:600;
margin-bottom:5px;
}

select,input[type=range]{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.buttons{
grid-column:1 / -1;
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
padding:12px 18px;
font-size:14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#4a7cff;
color:white;
transition:0.25s;
}

button:hover{
background:#345fd1;
transform:translateY(-2px);
}

button:disabled{
background:#aaa;
cursor:not-allowed;
}

#progress{
width:100%;
height:14px;
margin-top:20px;
display:none;
}

audio{
width:100%;
margin-top:20px;
}

@media(max-width:600px){

.controls{
grid-template-columns:1fr;
}

.buttons{
flex-direction:column;
}

button{
width:100%;
}

}

.loader-wrapper{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
flex-direction:column;
z-index:1000;
color:white;
font-size:18px;
}

.spinner{
width:60px;
height:60px;
border:6px solid rgba(255,255,255,0.3);
border-top:6px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:15px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="container">

<h2>🎙 Kokoro TTS Studio</h2>

<textarea id="text" rows="8" placeholder="Write narration here..."></textarea>

<div class="stats">
<span>Words: <b id="words">0</b></span>
<span>Characters: <b id="chars">0</b></span>
<span>Estimated Duration: <b id="duration">0</b> sec</span>
</div>

<div class="controls">

<div class="control-group">
<label>Voice</label>
<select id="voice"></select>
<button onclick="testVoice()">Test Voice</button>
</div>

<div class="control-group">
<label>Speed: <span id="speedValue">1</span></label>
<input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
</div>

<div class="buttons">
<button onclick="generate()" id="generateBtn">Generate</button>
<button onclick="clearText()">Clear</button>
<button onclick="downloadAudio()">Download</button>
</div>

</div>

<div id="loader" class="loader-wrapper">
    <div class="spinner"></div>
    <p>Generating audio...</p>
</div>

<progress id="progress" value="0" max="100"></progress>

<audio id="player" controls></audio>

</div>

<script>

let audioURL = null

const textarea = document.getElementById("text")
const words = document.getElementById("words")
const chars = document.getElementById("chars")
const duration = document.getElementById("duration")
const baseURL = "https://c468-103-165-103-38.ngrok-free.app "

// load voices from API

async function loadVoices() {

    const res = await fetch(`${baseURL}/voices`)
    const data = await res.json()

    const voiceSelect = document.getElementById("voice")

    voiceSelect.innerHTML = "" // clear before adding

    data.forEach(v => {
        const option = document.createElement("option")

        option.value = v.id

        // 🔥 THIS IS THE IMPORTANT PART
        option.text = `${v.name} (${v.gender}) - ${v.language}`

        voiceSelect.appendChild(option)
    })
}

loadVoices()

// word count + estimate

textarea.addEventListener("input", async ()=>{

    const text = textarea.value

    chars.innerText = text.length

    const w = text.trim().split(/\s+/).filter(x=>x.length>0)

    words.innerText = w.length

    if(text.length > 5){

        const res = await fetch(`${baseURL}/estimate`,{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({text:text})
        })

        const data = await res.json()

        duration.innerText = Math.round(data.estimated_seconds)

    }

})

// speed slider

const speedSlider = document.getElementById("speed")
const speedValue = document.getElementById("speedValue")

speedSlider.oninput = ()=>{
    speedValue.innerText = speedSlider.value
}

// generate audio

async function generate(){

    const text = textarea.value
    const voice = document.getElementById("voice").value
    const speed = parseFloat(speedSlider.value)

    if(text.length==0){
        alert("Enter text first")
        return
    }

    showLoader("Generating audio...")

    const progress = document.getElementById("progress")
    const btn = document.getElementById("generateBtn")

    btn.disabled=true

    progress.style.display="block"
    progress.value=20

    const res = await fetch(`${baseURL}/generate`,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            text:text,
            voice:voice,
            speed:speed
        })
    })

    progress.value=70

    const blob = await res.blob()

    audioURL = URL.createObjectURL(blob)

    document.getElementById("player").src = audioURL

    progress.value=100

    setTimeout(()=>{
        progress.style.display="none"
        progress.value=0
    },1000)

    btn.disabled=false

    hideLoader()
}

// test voice

async function testVoice(){

    const voice = document.getElementById("voice").value

    showLoader("Testing voice...")

    const res = await fetch(`${baseURL}/voice-sample`,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({voice:voice})
    })

    const blob = await res.blob()

    const url = URL.createObjectURL(blob)

    document.getElementById("player").src = url
    hideLoader()
    
}

// clear text

function clearText(){
textarea.value=""
words.innerText=0
chars.innerText=0
duration.innerText=0
}

// download audio

function downloadAudio(){

    if(!audioURL){
        alert("Generate audio first")
        return
    }

    const a = document.createElement("a")
    a.href=audioURL
    a.download="kokoro_audio.wav"
    a.click()
}

const loader = document.getElementById("loader")

function showLoader(text="Processing..."){
    loader.style.display="flex"
    loader.querySelector("p").innerText=text
}

function hideLoader(){
    loader.style.display="none"
}

</script>

</body>

</html>
